<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SophiaTV</title>
  <meta name="description" content="Sign in to your SophiaTV account." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 20px 40px; }
    .auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { text-decoration: none; font-size: 1.6rem; font-weight: 800; color: var(--white); }
    .auth-logo a em { color: var(--gold); font-style: normal; }
    .auth-title { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .auth-sub { color: var(--muted); text-align: center; font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--white); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--gold-border); }
    .forgot-link { display: block; text-align: right; font-size: 0.8rem; color: var(--gold); text-decoration: none; margin-top: 6px; }
    .btn-auth { width: 100%; padding: 14px; background: var(--gold); color: #000; font-weight: 700; font-size: 1rem; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s; font-family: inherit; }
    .btn-google:hover { border-color: var(--gold-border); }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted); }
    .auth-footer a { color: var(--gold); text-decoration: none; }
    .auth-error { background: rgba(229,57,53,0.1); border: 1px solid rgba(229,57,53,0.3); border-radius: 8px; padding: 12px 14px; font-size: 0.85rem; color: #ff6b6b; margin-bottom: 18px; display: none; }
    .auth-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 12px 14px; font-size: 0.85rem; color: var(--green); margin-bottom: 18px; display: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-mark"><div class="logo-ring"></div><span class="logo-play">&#9654;</span></div>
        <span class="logo-text">Sophia<em>TV</em></span>
      </a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/">Sophia<em>TV</em></a></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to your SophiaTV account</p>

      <div id="authError" class="auth-error"></div>
      <div id="authSuccess" class="auth-success"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
          <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <button class="btn-google" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Sign up free</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wftxhojlvrymtdtekhdx.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // Replace in Vercel env vars
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('authSuccess').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('authError').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = '/dashboard';
      } catch (err) {
        showError(err.message || 'Sign in failed. Please check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleGoogleLogin() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard' }
      });
      if (error) showError(error.message);
    }

    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Enter your email address first.'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/dashboard',
      });
      if (error) showError(error.message);
      else showSuccess('Password reset email sent. Check your inbox.');
    }
  </script>
</body>
</html>
