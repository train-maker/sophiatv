<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sophia Vision — Camera</title>
<meta name="description" content="Sophia Vision — point your camera at anything. Real-time AI analysis powered by Claude vision. Identify products, translate signs, audit listings, scan documents." />
<link rel="canonical" href="https://sophiatv.vercel.app/camera/" />
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="/assets/css/sovereign.css" />
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/future.css" />
<link rel="icon" href="/assets/brand/sophia-logo-premium.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #06070a; --bone: #f5f1e6; --bone-2: #9ca3af; --gold: #d8b34f; --gold-soft: rgba(216,179,79,0.18); --line: rgba(200,162,74,0.22); }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--bone); font-family: Inter, system-ui, sans-serif; min-height: 100vh; }
  .vision-shell { padding-top: 64px; min-height: 100vh; display: flex; flex-direction: column; }
  .vision-head { max-width: 720px; margin: 24px auto 14px; padding: 0 20px; text-align: center; }
  .vision-head h1 { font-family: 'Playfair Display', Georgia, serif; font-weight: 500; font-size: clamp(28px, 4vw, 40px); margin: 0 0 6px; letter-spacing: -0.01em; }
  .vision-head p { color: rgba(245,241,230,0.65); font-size: 0.92rem; margin: 0; }
  .stage { max-width: 720px; margin: 0 auto 18px; padding: 0 18px; width: 100%; }
  .frame { position: relative; aspect-ratio: 4/3; width: 100%; border-radius: 10px; overflow: hidden; background: #0a0b10; border: 1px solid var(--line); box-shadow: 0 30px 60px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,245,194,0.12); }
  .frame::before { content: ''; position: absolute; inset: 6px; border: 1px solid rgba(216,179,79,0.45); border-radius: 6px; pointer-events: none; z-index: 5; box-shadow: 0 0 0 1px rgba(0,0,0,0.4); }
  video, canvas, .placeholder, img.captured { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  canvas { display: none; }
  .placeholder { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: rgba(245,241,230,0.55); padding: 24px; text-align: center; background: linear-gradient(135deg, #0a0b10, #15170f); }
  .placeholder svg { width: 56px; height: 56px; color: var(--gold); opacity: 0.65; }
  .corner { position: absolute; width: 24px; height: 24px; border: 2px solid var(--gold); pointer-events: none; z-index: 6; }
  .corner.tl { top: 14px; left: 14px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 14px; right: 14px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }
  .focus-dot { position: absolute; left: 50%; top: 50%; width: 10px; height: 10px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 0 3px rgba(216,179,79,0.35), 0 0 0 8px rgba(216,179,79,0.12); transform: translate(-50%,-50%); pointer-events: none; z-index: 7; opacity: 0.85; }
  .controls { display: flex; gap: 12px; max-width: 720px; margin: 0 auto 14px; padding: 0 18px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .btn { background: linear-gradient(135deg, #fff0a6, #d8b34f 44%, #8a5a13); color: #000; border: 0; padding: 12px 22px; border-radius: 999px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 0.92rem; letter-spacing: 0.02em; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.outline { background: transparent; color: var(--gold); border: 1px solid rgba(216,179,79,0.45); }
  .btn.outline.is-on { background: var(--gold-soft); }
  .btn.icon { padding: 12px; width: 46px; height: 46px; display: inline-flex; align-items: center; justify-content: center; }
  .btn.shutter { width: 72px; height: 72px; border-radius: 50%; padding: 0; box-shadow: 0 0 0 4px rgba(216,179,79,0.22), 0 12px 32px rgba(0,0,0,0.5); }
  .btn.shutter::after { content: ''; display: block; width: 56px; height: 56px; border-radius: 50%; border: 2px solid #000; }
  .reply { max-width: 720px; margin: 0 auto 60px; padding: 22px 22px; background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0)) , rgba(13,14,19,0.86); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.35); margin-left: 18px; margin-right: 18px; min-height: 96px; backdrop-filter: blur(8px); position: relative; }
  .reply.is-pending::after { content: ''; position: absolute; top: 18px; right: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--gold); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.1); } }
  .reply h2 { font-size: 11px; letter-spacing: 0.16em; font-weight: 700; color: var(--gold); text-transform: uppercase; margin: 0 0 8px; }
  .reply p { font-size: 0.95rem; line-height: 1.6; color: var(--bone); margin: 0 0 10px; }
  .reply small { color: var(--bone-2); font-size: 0.78rem; }
  .reply.empty p { color: var(--bone-2); font-style: italic; }
  .preset-row { display: flex; gap: 8px; max-width: 720px; margin: 0 auto 18px; padding: 0 18px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .preset-row::-webkit-scrollbar { display: none; }
  .preset { background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--bone-2); padding: 8px 14px; border-radius: 999px; font-size: 0.82rem; cursor: pointer; white-space: nowrap; transition: all .15s; font-family: inherit; }
  .preset:hover, .preset.is-on { color: var(--gold); border-color: var(--gold); background: var(--gold-soft); }
  .err { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: #f87171; padding: 12px 16px; border-radius: 6px; margin: 12px auto; max-width: 720px; font-size: 0.88rem; }
  @media (max-width: 480px) {
    .vision-head { margin-top: 14px; }
    .stage { padding: 0 12px; }
    .controls { gap: 10px; padding: 0 12px; }
    .btn.shutter { width: 64px; height: 64px; }
    .reply { margin-left: 12px; margin-right: 12px; padding: 18px; }
  }
</style>
</head><body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">
      <img src="/assets/brand/sophia-logo-premium.png" alt="" class="logo-img logo-premium-img" width="32" height="32" />
      <span class="logo-text">Sophia<em>TV</em></span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/video.html" class="nav-link">Video</a>
      <a href="/social.html" class="nav-link">Social</a>
      <a href="/market.html" class="nav-link">Market</a>
      <a href="/wellness.html" class="nav-link">Wellness</a>
      <a href="/everyday-tools.html" class="nav-link">Tools</a>
      <a href="/pricing.html" class="nav-link">Pricing</a>
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
    </div>
  </div>
</nav>

<main class="vision-shell">
  <header class="vision-head">
    <h1>Sophia Vision</h1>
    <p>Point your camera at anything. Sophia sees it and tells you what matters. Powered by Claude vision.</p>
  </header>

  <div class="stage">
    <div class="frame" id="frame">
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 6.5H4a2 2 0 0 0-2 2V18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8.5a2 2 0 0 0-2-2h-3L14.5 4z"/><circle cx="12" cy="13" r="4"/></svg>
        <div>Tap <strong style="color:var(--gold)">Start camera</strong> to begin</div>
      </div>
      <video id="video" playsinline autoplay muted style="display:none;"></video>
      <img id="captured" class="captured" alt="" style="display:none;" />
      <canvas id="canvas"></canvas>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>

  <div class="preset-row" id="presetRow" aria-label="Quick prompts">
    <button class="preset is-on" data-preset="Describe what I see and tell me one operator-relevant insight.">Describe</button>
    <button class="preset" data-preset="Identify any product, brand, or business in this image.">Identify product</button>
    <button class="preset" data-preset="Read and translate any text or signs in this image to English.">Translate text</button>
    <button class="preset" data-preset="If this is a business listing or storefront, suggest 3 quick improvements for SophiaMarket.">Listing audit</button>
    <button class="preset" data-preset="Audit the food or drink in this image — calories estimate, allergens, healthier swap.">Food audit</button>
    <button class="preset" data-preset="Estimate market value or going price of this item, with a brief rationale.">Price estimate</button>
    <button class="preset" data-preset="Spot any safety, legal, or trust concerns in this scene.">Safety scan</button>
  </div>

  <div class="controls">
    <button class="btn outline" id="btnStart">Start camera</button>
    <button class="btn shutter" id="btnSnap" disabled aria-label="Capture and ask Sophia"></button>
    <button class="btn icon outline" id="btnFlip" disabled title="Flip camera" aria-label="Flip camera">↺</button>
    <button class="btn icon outline" id="btnVoice" title="Hands-free voice" aria-label="Hands-free voice">M</button>
  </div>

  <div id="err" class="err" style="display:none;"></div>

  <section class="reply empty" id="reply" aria-live="polite">
    <h2>Sophia</h2>
    <p>Capture a frame and I will tell you what I see.</p>
  </section>
</main>

<script>
(function() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  var captured = document.getElementById('captured');
  var placeholder = document.getElementById('placeholder');
  var btnStart = document.getElementById('btnStart');
  var btnSnap = document.getElementById('btnSnap');
  var btnFlip = document.getElementById('btnFlip');
  var btnVoice = document.getElementById('btnVoice');
  var err = document.getElementById('err');
  var reply = document.getElementById('reply');
  var presetRow = document.getElementById('presetRow');

  var stream = null;
  var facing = 'environment';
  var currentPrompt = 'Describe what I see and tell me one operator-relevant insight.';
  var voiceMode = false;
  var voiceTimer = null;

  function showErr(msg) { err.style.display = 'block'; err.textContent = msg; }
  function hideErr() { err.style.display = 'none'; }

  presetRow.querySelectorAll('.preset').forEach(function (b) {
    b.addEventListener('click', function () {
      presetRow.querySelectorAll('.preset').forEach(function (x) { x.classList.remove('is-on'); });
      b.classList.add('is-on');
      currentPrompt = b.getAttribute('data-preset');
    });
  });

  async function startCamera() {
    hideErr();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false,
      });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      captured.style.display = 'none';
      btnSnap.disabled = false;
      btnFlip.disabled = false;
      btnStart.textContent = 'Stop camera';
      btnStart.classList.add('is-on');
    } catch (e) {
      showErr('Camera access denied or unavailable. Check browser permissions.');
    }
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(function (t) { t.stop(); });
    stream = null;
    video.style.display = 'none';
    placeholder.style.display = 'flex';
    btnSnap.disabled = true;
    btnFlip.disabled = true;
    btnStart.textContent = 'Start camera';
    btnStart.classList.remove('is-on');
    if (voiceMode) toggleVoice();
  }

  btnStart.addEventListener('click', function () {
    if (stream) stopCamera(); else startCamera();
  });

  btnFlip.addEventListener('click', function () {
    facing = facing === 'environment' ? 'user' : 'environment';
    if (stream) { stopCamera(); startCamera(); }
  });

  function captureFrame() {
    if (!video.videoWidth) return null;
    var w = Math.min(1024, video.videoWidth);
    var ratio = video.videoHeight / video.videoWidth;
    var h = Math.round(w * ratio);
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    var data = canvas.toDataURL('image/jpeg', 0.82);
    return data;
  }

  async function snap() {
    if (!stream) return;
    var dataUrl = captureFrame();
    if (!dataUrl) return;

    captured.src = dataUrl;
    captured.style.display = 'block';
    video.style.display = 'none';
    setTimeout(function () { if (stream) { captured.style.display = 'none'; video.style.display = 'block'; } }, 1400);

    reply.classList.remove('empty');
    reply.classList.add('is-pending');
    reply.querySelector('p').textContent = 'Sophia is looking…';

    try {
      var r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: currentPrompt,
          imageBase64: dataUrl,
          imageMediaType: 'image/jpeg',
        }),
      });
      var j = await r.json();
      reply.classList.remove('is-pending');
      var text = j.reply || (j.error ? ('Error: ' + j.error) : '(no reply)');
      reply.querySelector('p').textContent = text;
      if (voiceMode && 'speechSynthesis' in window) {
        var u = new SpeechSynthesisUtterance(text);
        u.rate = 1.05; u.pitch = 1; u.lang = 'en-US';
        speechSynthesis.cancel(); speechSynthesis.speak(u);
      }
    } catch (e) {
      reply.classList.remove('is-pending');
      reply.querySelector('p').textContent = 'Connection error — try again.';
    }
  }

  btnSnap.addEventListener('click', snap);

  function toggleVoice() {
    voiceMode = !voiceMode;
    btnVoice.classList.toggle('is-on', voiceMode);
    btnVoice.title = voiceMode ? 'Voice mode ON — auto capture every 5s' : 'Hands-free voice';
    if (voiceMode) {
      voiceTimer = setInterval(function () { if (stream) snap(); }, 5000);
    } else {
      if (voiceTimer) clearInterval(voiceTimer);
      voiceTimer = null;
      if ('speechSynthesis' in window) speechSynthesis.cancel();
    }
  }
  btnVoice.addEventListener('click', toggleVoice);

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') { e.preventDefault(); if (!btnSnap.disabled) snap(); }
  });

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && stream) stopCamera();
  });
})();
</script>
</body></html>
