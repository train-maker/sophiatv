      <stop offset="0%" stop-color="#fff5c2"/>
      <stop offset="28%" stop-color="#f0d27a"/>
      <stop offset="56%" stop-color="#d8b34f"/>
      <stop offset="82%" stop-color="#a07021"/>
      <stop offset="100%" stop-color="#5e3608"/>
