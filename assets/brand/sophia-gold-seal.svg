<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Sophia gold seal</title>
  <desc id="desc">A polished gold Sophia monogram seal on a black diamond field.</desc>
  <defs>
    <radialGradient id="field" cx="50%" cy="38%" r="70%">
      <stop offset="0" stop-color="#18202a"/>
      <stop offset="0.48" stop-color="#05070b"/>
      <stop offset="1" stop-color="#010204"/>
    </radialGradient>
    <linearGradient id="gold" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0" stop-color="#fff8cf"/>
      <stop offset="0.15" stop-color="#ffc94b"/>
      <stop offset="0.38" stop-color="#c98518"/>
      <stop offset="0.58" stop-color="#fff0a6"/>
      <stop offset="0.78" stop-color="#8a4a0f"/>
      <stop offset="1" stop-color="#4a2608"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8cf"/>
      <stop offset="0.45" stop-color="#b87513"/>
      <stop offset="1" stop-color="#ffd05a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#d6a947" flood-opacity="0.28"/>
    </filter>
    <filter id="engrave" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.3" stdDeviation="0.4" flood-color="#ffffff" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="-1.8" stdDeviation="0.8" flood-color="#2b1200" flood-opacity="0.55"/>
    </filter>
    <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M1 2h1M8 3h1M4 8h1M10 10h1" stroke="#fff4bc" stroke-opacity="0.18" stroke-width="0.7"/>
      <path d="M6 1h1M2 10h1M11 5h1" stroke="#6b3d10" stroke-opacity="0.18" stroke-width="0.7"/>
    </pattern>
  </defs>

  <circle cx="210" cy="210" r="188" fill="url(#field)" filter="url(#softShadow)"/>
  <circle cx="210" cy="210" r="184" fill="none" stroke="url(#edge)" stroke-width="4"/>
  <circle cx="210" cy="210" r="163" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.86"/>
  <circle cx="210" cy="210" r="138" fill="none" stroke="#fff0a6" stroke-opacity="0.16" stroke-width="1"/>

  <g opacity="0.58">
    <path d="M92 232c44-64 94-96 150-96 41 0 68 14 86 36" fill="none" stroke="#f1cf71" stroke-opacity="0.2" stroke-width="1.4"/>
    <path d="M84 262c52-40 105-60 158-60 36 0 66 9 91 27" fill="none" stroke="#f1cf71" stroke-opacity="0.16" stroke-width="1.2"/>
    <path d="M112 162c34 24 67 36 99 36 32 0 65-12 99-36" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  </g>

  <g filter="url(#engrave)">
    <path fill="url(#gold)" d="M246 103c-16-12-37-18-62-18-45 0-77 24-77 58 0 28 20 45 58 60l32 13c27 11 40 23 40 43 0 24-22 40-54 40-33 0-59-16-75-45l-13 7c15 36 47 58 88 58 47 0 80-25 80-63 0-31-19-49-61-66l-34-14c-25-10-36-21-36-37 0-22 21-36 51-36 22 0 41 6 56 18l7-18Z"/>
    <path fill="url(#gold)" d="M168 81c28-23 70-31 106-18 20 7 35 19 46 34l-13 10c-10-13-23-23-39-29-29-10-64-4-88 16l-12-13Z" opacity="0.74"/>
    <path fill="#fff7c6" d="M126 260c11 23 31 40 57 47 23 6 49 2 68-11-18 18-46 27-74 20-30-8-53-28-65-50l14-6Z" opacity="0.52"/>
  </g>

  <circle cx="210" cy="210" r="188" fill="url(#grain)" opacity="0.28"/>
  <path d="M76 120c52-34 97-51 134-51s82 17 134 51" fill="none" stroke="#fff0a6" stroke-opacity="0.18" stroke-width="1"/>
  <path d="M76 300c52 34 97 51 134 51s82-17 134-51" fill="none" stroke="#fff0a6" stroke-opacity="0.18" stroke-width="1"/>
  <circle cx="320" cy="102" r="5" fill="#fff2a8"/>
  <path d="M320 78v48M296 102h48M303 85l34 34M337 85l-34 34" stroke="#f7d56d" stroke-opacity="0.72" stroke-width="1"/>
