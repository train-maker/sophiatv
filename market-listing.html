<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Profile — SophiaMarket</title>
  <meta name="description" content="Full business profile on SophiaMarket, the global business directory by SophiaTV." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    .profile-wrap { max-width: 900px; margin: 0 auto; padding: 90px 36px 60px; }
    .profile-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      margin-bottom: 24px; transition: color 0.2s;
    }
    .profile-back:hover { color: var(--gold); }

    .profile-header {
      display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; margin-bottom: 24px;
    }
    .profile-logo-box {
      width: 80px; height: 80px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 44px; flex-shrink: 0;
    }
    .profile-meta { flex: 1; min-width: 200px; }
    .profile-name { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .profile-location { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 5px;
    }
    .badge-cat { background: rgba(156,109,255,0.15); color: var(--purple); }
    .badge-featured { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .profile-featured { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.14); }

    .profile-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
    @media (max-width: 700px) { .profile-grid { grid-template-columns: 1fr; } }

    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .profile-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--gold); }
    .profile-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

    .gallery-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 0;
    }
    .gallery-item {
      aspect-ratio: 4/3; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--muted);
    }

    .tags-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: var(--bg3); border: 1px solid var(--border);
      font-size: 12px; padding: 4px 10px; border-radius: 20px; color: var(--muted);
    }

    .social-links { display: flex; flex-direction: column; gap: 8px; }
    .social-link {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text); text-decoration: none;
      padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; transition: border-color 0.2s;
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* Contact form */
    .contact-form label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .contact-form input, .contact-form textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 7px;
      font-size: 13px; font-family: inherit; outline: none; margin-bottom: 12px;
      transition: border 0.2s;
    }
    .contact-form input:focus, .contact-form textarea:focus { border-color: var(--gold); }
    .contact-form textarea { resize: vertical; min-height: 90px; }
    .btn-gold-full {
      width: 100%; padding: 11px; font-size: 14px; font-weight: 700;
      background: var(--gold); color: #07070e; border: none; border-radius: 7px;
      cursor: pointer; font-family: inherit; transition: opacity 0.2s; margin-bottom: 10px;
    }
    .btn-gold-full:hover { opacity: 0.88; }
    .report-link { font-size: 12px; color: var(--muted); text-align: center; display: block; }
    .report-link a { color: var(--muted); text-decoration: underline; }
    .report-link a:hover { color: var(--red); }

    .contact-info-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .contact-info-row:last-child { border-bottom: none; }
    .contact-info-row a { color: var(--gold); text-decoration: none; }

    .toast {
      position: fixed; bottom: 28px; right: 28px; background: var(--green);
      color: #07070e; padding: 12px 20px; border-radius: 8px; font-weight: 600;
      font-size: 14px; z-index: 400; transform: translateY(60px); opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .not-found { text-align: center; padding: 80px 20px; }
    .not-found h2 { font-size: 28px; margin-bottom: 12px; }
    .not-found p { color: var(--muted); }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon" style="width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#07070e;">S</div>
        <span style="font-weight:800;font-size:18px;letter-spacing:-0.3px;">Sophia<span style="color:var(--gold)">TV</span></span>
      </a>
      <div class="nav-links">
        <a href="/#live" class="nav-link">Live</a>
        <a href="/#feed" class="nav-link">Feed</a>
        <a href="/#creators" class="nav-link">Creators</a>
        <a href="/market.html" class="nav-link" style="color:var(--gold);">Market</a>
        <a href="/#sessions" class="nav-link">Sessions</a>
        <a href="/pricing.html" class="nav-link">Pricing</a>
      </div>
      <div class="nav-right" style="margin-left:auto;">
        <a href="/market-submit.html" class="btn-gold" style="padding:8px 18px;font-size:13px;font-weight:700;background:var(--gold);color:#07070e;border-radius:7px;text-decoration:none;">List Your Business</a>
      </div>
    </div>
  </nav>

  <div class="profile-wrap" id="profileWrap">
    <a href="/market.html" class="profile-back">← Back to SophiaMarket</a>
    <div id="profileContent" style="display:none;">
      <!-- injected by JS -->
    </div>
    <div id="notFound" class="not-found" style="display:none;">
      <h2>Listing Not Found</h2>
      <p>This business profile doesn't exist or was removed.</p>
      <br/>
      <a href="/market.html" class="btn-gold" style="padding:10px 24px;font-weight:700;font-size:14px;background:var(--gold);color:#07070e;border-radius:7px;text-decoration:none;">Browse SophiaMarket</a>
    </div>
  </div>

  <div class="toast" id="toast">Message sent!</div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      let listings = [];
      try {
        const res = await fetch('/sample-listings.json');
        listings = await res.json();
      } catch(e) {}

      const listing = listings.find(l => l.id === id);
      if (!listing) {
        document.getElementById('notFound').style.display = 'block';
        return;
      }

      document.title = `${listing.name} — SophiaMarket`;

      const socialHTML = Object.entries(listing.social || {}).map(([platform, val]) => {
        const icons = { linkedin: '💼', instagram: '📸', facebook: '🔵', twitter: '🐦', youtube: '▶️', github: '⚙️', tiktok: '🎵', wechat: '💬', kakao: '💛' };
        return `<a class="social-link" href="${val}"><span>${icons[platform] || '🔗'}</span><span>${platform.charAt(0).toUpperCase() + platform.slice(1)}</span></a>`;
      }).join('');

      const tagsHTML = (listing.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      document.getElementById('profileContent').innerHTML = `
        <div class="profile-header ${listing.featured ? 'profile-featured' : ''}">
          <div class="profile-logo-box">${listing.flag}</div>
          <div class="profile-meta">
            <div class="profile-name">${listing.name}</div>
            <div class="profile-location">📍 ${listing.city}, ${listing.country}</div>
            <div class="badge-row">
              <span class="badge badge-cat">${listing.category}</span>
              ${listing.featured ? '<span class="badge badge-featured">★ Featured</span>' : ''}
            </div>
          </div>
        </div>

        <div class="profile-grid">
          <div>
            <div class="profile-card">
              <h3>About This Business</h3>
              <p class="profile-desc">${listing.description}</p>
            </div>

            <div class="profile-card">
              <h3>Gallery</h3>
              <div class="gallery-grid">
                <div class="gallery-item">🏢</div>
                <div class="gallery-item">📦</div>
                <div class="gallery-item">🤝</div>
              </div>
            </div>

            <div class="profile-card">
              <h3>Tags</h3>
              <div class="tags-wrap">${tagsHTML || '<span class="tag">No tags</span>'}</div>
            </div>

            ${socialHTML ? `<div class="profile-card"><h3>Social & Web</h3><div class="social-links">${socialHTML}</div></div>` : ''}
          </div>

          <div>
            <div class="profile-card">
              <h3>Contact</h3>
              <div class="contact-info-row">📧 <a href="mailto:${listing.contact}">${listing.contact}</a></div>
              <div class="contact-info-row">📞 <a href="tel:${listing.phone}">${listing.phone}</a></div>
              ${listing.website ? `<div class="contact-info-row">🌐 <a href="${listing.website}" target="_blank" rel="noopener">${listing.website.replace('https://','')}</a></div>` : ''}
            </div>

            <div class="profile-card">
              <h3>Send a Message</h3>
              <div class="contact-form">
                <label>Your Name</label>
                <input type="text" id="cName" placeholder="Full name" />
                <label>Your Email</label>
                <input type="email" id="cEmail" placeholder="you@example.com" />
                <label>Message</label>
                <textarea id="cMsg" placeholder="What are you looking for?"></textarea>
                <button class="btn-gold-full" onclick="sendMsg('${listing.name}')">Send Message</button>
                <span class="report-link"><a href="mailto:hello@sophiaoperator.com?subject=Report+Listing+${listing.id}">Report this listing</a></span>
              </div>
            </div>
          </div>
        </div>
      `;
      document.getElementById('profileContent').style.display = 'block';
    }

    function sendMsg(bizName) {
      const n = document.getElementById('cName').value.trim();
      const e = document.getElementById('cEmail').value.trim();
      const m = document.getElementById('cMsg').value.trim();
      if (!n || !e || !m) { alert('Please fill in all fields.'); return; }
      const t = document.getElementById('toast');
      t.textContent = 'Message sent to ' + bizName + '!';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
      document.getElementById('cName').value = '';
      document.getElementById('cEmail').value = '';
      document.getElementById('cMsg').value = '';
    }

    init();
  </script>
</body>
</html>
